<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS for Targeting Elements</title>
    <link rel="stylesheet" href="syntax_targeting.css">
    
    <style>
        body{
            background-color: #eee;
        }

        #main-content{
            background-color: #fff;
            width:1200px;
            margin: 0 auto;
            padding: 20px;
        }
    </style>
</head>
<body>

    <div id="main-content">
        <h1>CSS for Targeting Elements</h1>
        <div class="box dashed">dashed</div>
        <div class="box dotted">dotted</div>
        <div class="box double">double</div>
        <div class="box groove">groove</div>
        <div class="box inset">inset</div>
        <div class="box outset">outset</div>
        <div class="box ridge">ridge</div>
        <div class="box solid">solid</div>

    </div>
        
</body>              
</html>
